<!DOCTYPE html>
<html>
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<title>Pental Shop</title>
	<link rel="stylesheet" type="text/css" href="stylesheet.css">
</head>
<body>
	<h2>Pental Shop</h2>
	<p>Here, You will find every penting items in a<br>reasonable price.</p>

	<table class="infoTable" border="1">
		<thead class="head">
			<tr>
				<th>Item Name</th>
				<th>Quantity</th>
				<th>Status</th>
			</tr>
		</thead>
		
		<tbody class="body">
			<tr>
				<td>Pencils</td>
				<td>100</td>
				<td>In Stock</td>
			</tr>
			<tr>
				<td>Notebooks</td>
				<td>50</td>
				<td>Low Stock</td>
			</tr>
			<tr>
				<td>Markers</td>
				<td>15</td>
				<td>In Stock</td>
			</tr>
		</tbody>
	</table>
	
	<section class="form">
		<h2 class="contact">Contact Information</h2>
		<form class="infoForm">
			<table>
				<tr>
					<td>Name</td>
					<td><input type="text"></td>
				</tr>
				<tr>
					<td>E-mail</td>
					<td><input type="email"></td>
				</tr>
				<tr>
					<td>Message</td>
					<td><textarea cols=45 rows=5></textarea></td>
				</tr>
				<tr>
					<td></td>
					<td><input type="submit" value="Submit"></td>
				</tr>
			</table>
		</form>	
	</section>
</body>
</html>
