<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Registration Form</title>
    <link rel="stylesheet" href="stylesheet.css">
</head>
<body>
    <section class="header">
        <h3>Student <span>Registration Form</span></h3>
    </section>

    <fieldset>
        <legend>Student Registration</legend>

        <section class="form">
            <form class="registrationForm" id="registrationForm" novalidate>
                <table>
                    <tr class="head">
                        <td>
                            <p>Provide your all information correctly to register</p>
                        </td>
                    </tr>

                    <tr>
                        <td>
                            <label for="firstName">First Name :</label>
                            <input type="text" name="firstName" id="firstName" placeholder="Enter your first name" required>
                            <span class="error-msg" id="firstNameError"></span>
                        </td>
                    </tr>

                    <tr>
                        <td>
                            <label for="lastName">Last Name :</label>
                            <input type="text" name="lastName" id="lastName" placeholder="Enter your last name" required>
                            <span class="error-msg" id="lastNameError"></span>
                        </td>
                    </tr>

                    <tr>
                        <td>
                            <label for="studentId">Student ID :</label>
                            <input type="text" name="id" id="id" placeholder="Enter your student ID" required>
                            <span class="error-msg" id="idError"></span>
                        </td>
                    </tr>

                    <tr>
                        <td>
                            <label for="email">Email :</label>
                            <input type="email" name="email" id="email" placeholder="Enter your email" required>
                            <span class="error-msg" id="emailError"></span>
                        </td>
                    </tr>

                    <tr>
                        <td>
                            <label for="creditCompleted">Credit Completed :</label>
                            <input type="text" name="credit" id="credit" required>
                            <span class="error-msg" id="creditError"></span>
                        </td>
                    </tr>

                    <tr>
                        <td>
                            <label for="dpt">Department :</label>
                            <select name="dpt" id="dpt">
                                <option value="">Please select a department</option>
                                <option value="FST">FST</option>
                                <option value="FE">FE</option>
                                <option value="FBA">FBA</option>
                            </select>
                            <span class="error-msg" id="dptError"></span>
                        </td>
                    </tr>
                </table>
                <button type="submit" class="submitBtn">Submit</button>
            </form>
        </section>
    </fieldset>

    <fieldset class="list-fieldset">
        <legend>Registered Student List</legend>
        <div class="table-responsive">
            <table class="student-list-table">
                <thead>
                    <tr>
                        <th>First Name</th>
                        <th>Last Name</th>
                        <th>Student ID</th>
                        <th>Email</th>
                        <th>Credits</th>
                        <th>Department</th>
                    </tr>
                </thead>
                <tbody id="studentListBody">
                    <tr id="emptyRow">
                        <td colspan="6" class="no-data">No students registered yet.</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </fieldset>

    <script src="script.js"></script>
</body>
</html>
