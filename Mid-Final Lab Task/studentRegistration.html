<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Registration Form</title>
    <link rel="stylesheet" href="stylesheet.css">
</head>
<body>
    <section class="header">
        <h3>Student <span>Registration Form</span></h3>
    </section>

    <fieldset>
        <legend>Student Registration</legend>

        <section class="form">
            <form class="registrationForm" id="registrationForm" novalidate>
                <table>
                    <tr class="head">
                        <td>
                            <p>Provide your all information correctly to register</p>
                        </td>
                    </tr>

                    <tr>
                        <td>
                            <label for="name">First Name :</label>
                            <input type="text" name="name" id="firstName" placeholder="Enter your first name" required>
                        </td>
                    </tr>

                    <tr>
                        <td>
                            <label for="lastName">Last Name :</label>
                            <input type="text" name="lastName" id="lastName" placeholder="Enter your last name" required>
                        </td>
                    </tr>

                    <tr>
                        <td>
                            <label for="studentId">Student ID :</label>
                            <input type="text" name="id" id="id" placeholder="Enter your student ID" required>
                        </td>
                    </tr>

                    <tr>
                        <td>
                            <label for="email">Email :</label>
                            <input type="email" name="email" id="email" placeholder="Enter your email" required>
                        </td>
                    </tr>

                    <tr>
                        <td>
                            <label for="creditCompleted">Credit Completed :</label>
                            <input type="text" name="credit" id="credit" required>
                        </td>
                    </tr>

                    <tr>
                        <td>
                            <label for="dpt">Department :</label>
                            <select name="dpt" id="dpt">
                                <option value="">Please select a department</option>
                                <option value="FST">FST</option>
                                <option value="FE">FE</option>
                                <option value="FBA">FBA</option>
                            </select>
                        </td>
                    </tr>
                </table>
                <button type="submit" class="submitBtn">Submit</button>
            </form>
        </section>
    </fieldset>

    <script src="script.js"></script>

</body>
</html>
