<!DOCTYPE html>
<html>
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<title>Student Info Card</title>
	<link rel="stylesheet" type="text/css" href="stylesheet.css">
</head>
<body>

	<fieldset>

			<legend><b>Student Information</b></legend>

		<form>

			<section class="card">

				<table class="table">

					<!-- <table class="left">	 -->
						<tr>
							<section class="name">
								<td>
									<p>Full Name (Text)</p><br>
									<input type="text" placeholder="Enter Your Full Name">
								</td>
							</section>

							<section class="email">
								<td>
									<p>Email Address</p><br>
									<input type="email" placeholder="your email@example.com"/>
								</td>	
							</section>
						</tr>
						
						<tr>	
							<section class="pass">
								<td>	
									<p>Password</p><br>
									<input type="text" placeholder="Enter Secure Password">
								</td>	
							</section>

							<section class="age">
								<td>
									<p>Age (Number)</p><br>
									<input type="text" placeholder="Enter Your age">
								</td>						
							</section>
						</tr>
						
						<tr>
							<section class="date">
								<td>
									<p>Experiment Date</p><br>			
									<input type="date" class="date-placeholder" data-placeholder="Choose a Date" required>
								</td>	
							</section>

							<section class="phone">
								<td>
									<p>Phone Number (Tel)</p><br>
									<input type="text" placeholder="+880 XXXX XXXXXX">
								</td>
							</section>
						</tr>

					</table>	

			</section>

			<section class="Button">
				<section class="button1">
					<button>SUBMIT</button>
				</section>

				<section class="button2">
					<button>CLEAR</button>
				</section>
			</section>

		</form>

	</fieldset>

</body>

</html>
